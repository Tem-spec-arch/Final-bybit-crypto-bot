name: Bybit Trading Bot

on:
  schedule:
    # London Session (07:00–10:00 UTC) every 20 mins
    - cron: "*/20 7-9 * * *"
    
    # New York Session (13:00–16:00 UTC) every 20 mins
    - cron: "*/20 13-15 * * *"

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybit pandas pytz

      - name: Run trading bot
        env:
          BYBIT_API_KEY: ${{ secrets.BYBIT_API_KEY }}
          BYBIT_API_SECRET: ${{ secrets.BYBIT_API_SECRET }}
        run: |
          python bot.py